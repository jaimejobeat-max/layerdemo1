<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Pretendard',sans-serif; background:#FFFFFF; color:#0D0D0B; -webkit-font-smoothing:antialiased; }
  a { color:inherit; text-decoration:none; }
  .split { display:flex; min-height:100vh; }

  .photo {
    width:50%; position:relative;

  .photo .pg { position:absolute; left:16px; bottom:14px; font-size:10px; letter-spacing:.14em; color:#FFFFFF; mix-blend-mode:difference; font-weight:600; }

  .info { width:50%; position:relative; padding:22px 30px; display:flex; flex-direction:column; }
  .head { display:flex; justify-content:space-between; align-items:center; }
  .brand { display:flex; align-items:center; gap:9px; font-size:11px; letter-spacing:.14em; font-weight:700; }
  .menu { display:flex; gap:20px; font-size:10px; letter-spacing:.12em; font-weight:600; }

  .title { font-size:min(6vw,76px); font-weight:900; letter-spacing:-.02em; line-height:1.02; margin-top:12px; }
  .desc { font-size:14px; color:#55534C; margin-top:16px; line-height:1.8; max-width:36ch; }

  .cells { display:flex; gap:28px; font-size:11px; letter-spacing:.04em; color:#55534C; font-weight:600; border-top:1px solid #E2DFD8; padding-top:14px; }
  .cells b { display:block; color:#9A978E; font-weight:600; margin-bottom:3px; }
  .ctas { display:flex; gap:2px; margin-top:18px; }
  .ctas a { flex:1; text-align:center; font-size:11px; letter-spacing:.08em; font-weight:700; padding:13px 0; }
  .ctas .view { border:1px solid #E2DFD8; }
  .ctas .reserve { color:#FFFFFF; background:#0D0D0B; }

  @media (max-width:820px) {
    .split { flex-direction:column; }
    .photo { width:100%; height:48vh; }
    .info { width:100%; }
    .body { padding:26px 0; }
    .cells { flex-wrap:wrap; gap:16px 24px; }
  }
</style>
</head>
<body>

<div class="split">
